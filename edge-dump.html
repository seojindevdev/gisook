<!DOCTYPE html>
<html lang="ko"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>입사생 현황</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div id="authGate" class="auth-gate">
      <div class="auth-box">
        <div class="auth-title">비밀번호 입력</div>
        <div id="authNamePicker" class="auth-name-picker">
          <input id="authNameInput" class="auth-name-input" type="text" placeholder="이름 선택" autocomplete="off" spellcheck="false" aria-autocomplete="list">
          <button id="authNameToggleButton" class="auth-name-toggle" type="button" aria-label="이름 목록 열기" aria-haspopup="listbox" aria-expanded="false">
            ▾
          </button>
          <div id="authNameMenu" class="auth-name-menu hidden" role="listbox"></div>
        </div>
        <input id="passwordInput" type="password" placeholder="비밀번호" autocomplete="current-password">
        <button id="loginButton" type="button">입장</button>
        <div id="authMessage" class="auth-message"></div>
      </div>
    </div>

    <div id="appShell" class="app-shell hidden">
      <div class="top-row">
        <select id="nameInput"></select>
        <button id="loadUserButton" type="button">불러오기</button>
        <button id="saveUserButton" type="button">저장</button>
        <div id="roleBadge" class="role-badge"></div>
        <button id="logoutButton" type="button">로그아웃</button>
      </div>

      <div class="tabs">
        <button id="settingsTabButton" class="tab-button is-active" type="button">설정</button>
        <button id="overnightTabButton" class="tab-button" type="button">외박</button>
        <button id="dashboardTabButton" class="tab-button" type="button">현황</button>
        <button id="passwordTabButton" class="tab-button" type="button">비밀번호</button>
        <button id="messagesTabButton" class="tab-button" type="button">사감문자</button>
        <button id="adminTabButton" class="tab-button hidden" type="button">사감모드</button>
      </div>

      <section id="settingsTab" class="tab-panel is-active">
        <div id="dayTabs" class="day-tabs">
          <button class="day-button" type="button" data-day="MON">월</button>
          <button class="day-button" type="button" data-day="TUE">화</button>
          <button class="day-button" type="button" data-day="WED">수</button>
          <button class="day-button is-active" type="button" data-day="THU">목</button>
          <button class="day-button" type="button" data-day="FRI">금</button>
        </div>

        <div class="actions">
          <button id="addRowButton" type="button">행 추가</button>
          <button id="clearRowsButton" type="button">초기화</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>나감</th>
                <th>들어옴</th>
                <th>외출</th>
                <th>폰</th>
                <th>사유</th>
                <th>삭제</th>
              </tr>
            </thead>
            <tbody id="scheduleRows">
      <tr>
        <td colspan="6" class="empty-row">비어 있음</td>
      </tr>
    </tbody>
          </table>
        </div>

  </div>
      </section>

      <section id="overnightTab" class="tab-panel">
        <div class="actions">
          <button id="clearOvernightButton" type="button">초기화</button>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>요일</th>
                <th>사유</th>
                <th>취소</th>
              </tr>
            </thead>
            <tbody id="overnightRows">
      <tr data-day="MON">
        <td>월</td>
        <td>
          <input type="text" name="overnightReason" class="reason-input" value="" placeholder="사유" maxlength="100">
        </td>
        <td>
          <button type="button" class="remove-button" data-remove-overnight-day="MON">취소</button>
        </td>
      </tr>
    
      <tr data-day="TUE">
        <td>화</td>
        <td>
          <input type="text" name="overnightReason" class="reason-input" value="" placeholder="사유" maxlength="100">
        </td>
        <td>
          <button type="button" class="remove-button" data-remove-overnight-day="TUE">취소</button>
        </td>
      </tr>
    
      <tr data-day="WED">
        <td>수</td>
        <td>
          <input type="text" name="overnightReason" class="reason-input" value="" placeholder="사유" maxlength="100">
        </td>
        <td>
          <button type="button" class="remove-button" data-remove-overnight-day="WED">취소</button>
        </td>
      </tr>
    
      <tr data-day="THU">
        <td>목</td>
        <td>
          <input type="text" name="overnightReason" class="reason-input" value="" placeholder="사유" maxlength="100">
        </td>
        <td>
          <button type="button" class="remove-button" data-remove-overnight-day="THU">취소</button>
        </td>
      </tr>
    
      <tr data-day="FRI">
        <td>금</td>
        <td>
          <input type="text" name="overnightReason" class="reason-input" value="" placeholder="사유" maxlength="100">
        </td>
        <td>
          <button type="button" class="remove-button" data-remove-overnight-day="FRI">취소</button>
        </td>
      </tr>
    </tbody>
          </table>
        </div>

      <section id="dashboardTab" class="tab-panel">
        <div id="dashboardFilters" class="dashboard-filters">
          <button class="dashboard-filter-button is-active" type="button" data-dashboard-filter="ALL">전체</button>
          <button class="dashboard-filter-button" type="button" data-dashboard-filter="GRADE_1">1학년</button>
          <button class="dashboard-filter-button" type="button" data-dashboard-filter="GRADE_2">2학년</button>
          <button class="dashboard-filter-button" type="button" data-dashboard-filter="GRADE_3">3학년</button>
          <button class="dashboard-filter-button" type="button" data-dashboard-filter="OUT">외출</button>
          <button class="dashboard-filter-button" type="button" data-dashboard-filter="OVERNIGHT">외박</button>
          <label class="dashboard-mode-toggle">
            <input id="dashboardAttendanceModeInput" type="checkbox">
            <span>출석모드</span>
          </label>
        </div>
        <div id="summaryLine"></div>
        <div id="dashboardBoard" class="dashboard-board"></div>
      </section>

      <section id="passwordTab" class="tab-panel">
        <div class="password-box">
          <input id="currentPasswordInput" type="password" placeholder="현재 비밀번호" autocomplete="current-password">
          <input id="newPasswordInput" type="password" placeholder="새 비밀번호" autocomplete="new-password">
          <input id="confirmPasswordInput" type="password" placeholder="새 비밀번호 확인" autocomplete="new-password">
          <button id="changePasswordButton" type="button">비밀번호 변경</button>
        </div>
      </section>

      <section id="messagesTab" class="tab-panel">
        <div id="messageComposer" class="message-composer">
          <select id="messageSenderInput"></select>
          <textarea id="wardenMessageInput" class="message-textarea" rows="4" placeholder="사감께 보낼 내용을 입력"></textarea>
          <button id="sendWardenMessageButton" type="button">보내기</button>
        </div>
        <div id="messagesScopeLabel" class="messages-scope"></div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>시간</th>
                <th>보낸 사람</th>
                <th>내용</th>
              </tr>
            </thead>
            <tbody id="messageRows">
      <tr>
        <td colspan="3" class="empty-row">기록 없음</td>
      </tr>
    </tbody>
          </table>
        </div>
      </section>

      <section id="adminTab" class="tab-panel hidden">
        <div class="actions">
          <input id="adminNameInput" class="text-input" type="text" placeholder="이름">
          <select id="adminRoomInput"></select>
          <select id="adminSlotInput"></select>
          <select id="adminGradeInput">
            <option value="1">1학년</option>
            <option value="2">2학년</option>
            <option value="3">3학년</option>
          </select>
          <input id="adminPasswordInput" class="text-input" type="text" value="3141" placeholder="초기 비밀번호">
          <button id="adminAddButton" type="button">학생 추가</button>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>이름</th>
                <th>호실</th>
                <th>자리</th>
                <th>학년</th>
                <th>비밀번호 변경</th>
                <th>삭제</th>
              </tr>
            </thead>
            <tbody id="adminStudentRows">
      <tr>
        <td colspan="6" class="empty-row">학생이 없습니다</td>
      </tr>
    </tbody>
          </table>
        </div>
      </section>

      <div id="messageBox" class="message-box hidden"></div>
